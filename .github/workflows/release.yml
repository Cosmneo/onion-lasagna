name: Release

# Changesets bot. On every push to main it either:
#   • opens / updates a "chore: version packages" PR (when unreleased changesets exist), or
#   • publishes to npm (when that version PR has just been merged → no pending changesets).
# Beta vs stable is automatic: in changeset pre-mode (`bun changeset pre enter beta`) it
# publishes prereleases to the `beta` dist-tag; otherwise to `latest`.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # push the version commit + create tags/releases
  pull-requests: write # open the version PR
  id-token: write # npm provenance

jobs:
  release:
    name: Version PR / publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # A repo PAT (secret RELEASE_PAT) makes the bot's "version packages" PR trigger CI.
          # Without it, GITHUB_TOKEN is used and that PR won't auto-run CI — admin-merge it.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create version PR or publish
        uses: changesets/action@v1
        with:
          version: bun run version:packages
          publish: bun run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=8192'

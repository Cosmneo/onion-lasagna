name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `bun run build` runs tsup with DTS generation, which type-checks every
      # package. The heap flag matches the core package's declaration build.
      - name: Build (type declarations / typecheck)
        run: bun run build
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Test
        run: bun run test:run

      - name: Format check
        run: bun run format:check

      # Lint is advisory for now (pre-existing lint debt in a few files).
      # Flip to a hard gate once the backlog is cleared.
      - name: Lint
        run: bun run lint
        continue-on-error: true
